<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1350px;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    background: #080c16;
  }

  .card { width: 1080px; height: 1350px; position: relative; overflow: hidden; }

  /* ── FOTO DE FUNDO ── */
  .foto {
    position: absolute;
    inset: 0; width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.85) saturate(1.1);
  }

  /* fallback sem foto */
  .fallback-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0d1b38 0%, #152952 60%, #0d1b38 100%);
  }
  .fallback-icon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 320px; opacity: 0.06; pointer-events: none;
  }

  /* ── DEGRADÊ PRINCIPAL (foto → painel) ── */
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(5,8,18,0.10) 0%,
      rgba(5,8,18,0.15) 30%,
      rgba(5,8,18,0.60) 58%,
      rgba(5,8,18,0.98) 72%,
      #050812 100%
    );
  }

  /* ── TOPBAR: logo no canto ── */
  .topbar {
    position: absolute; top: 52px; left: 60px; right: 60px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }
  .brand-pill {
    display: flex; align-items: center; gap: 14px;
    background: rgba(5,8,18,0.62);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 60px;
    padding: 12px 26px 12px 16px;
  }
  .brand-logo {
    width: 46px; height: 46px; border-radius: 50%;
    background: #c9920a;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-logo svg { width: 28px; height: 28px; }
  .brand-name { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .brand-name span { color: #f0c060; }

  .live-badge {
    display: flex; align-items: center; gap: 10px;
    background: rgba(5,8,18,0.62);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 60px;
    padding: 12px 22px;
    font-size: 19px; font-weight: 700; color: rgba(255,255,255,0.75);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .live-dot { width: 10px; height: 10px; border-radius: 50%; background: #c9920a; }

  /* ── PAINEL INFERIOR ── */
  .panel {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 52px 60px 60px;
    z-index: 10;
    display: flex; flex-direction: column; gap: 26px;
  }

  /* linha de acento lateral */
  .accent-bar {
    position: absolute; left: 0; top: 52px; bottom: 60px;
    width: 6px; border-radius: 0 4px 4px 0;
    background: {{ACENTO_COR}};
  }

  /* tag de categoria */
  .tag {
    align-self: flex-start;
    background: {{ACENTO_GRADIENTE}};
    color: {{ACENTO_TEXTO}};
    font-size: 21px; font-weight: 800;
    padding: 10px 28px;
    border-radius: 6px;
    letter-spacing: 2px; text-transform: uppercase;
  }

  /* manchete */
  .headline {
    font-size: 68px; font-weight: 900; color: #fff;
    line-height: 1.10; letter-spacing: -1px;
    max-height: 370px; overflow: hidden;
  }

  /* linha divisória sutil */
  .divider { height: 1px; background: rgba(255,255,255,0.12); }

  /* rodapé: fonte + pergunta */
  .bottom-row {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
  }
  .source-info { display: flex; flex-direction: column; gap: 6px; }
  .source-label { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.38); text-transform: uppercase; letter-spacing: 2px; }
  .source-name { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.65); }

  .pergunta-box {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 16px 24px;
    max-width: 520px;
  }
  .pergunta-text { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.85); line-height: 1.3; }

  /* site watermark */
  .watermark {
    position: absolute; right: 60px; bottom: 20px;
    font-size: 17px; font-weight: 600; color: rgba(255,255,255,0.22);
    letter-spacing: 0.5px; z-index: 10;
  }
</style>
</head>
<body>
<div class="card">

  <!-- background -->
  <div class="fallback-bg"></div>
  <div class="fallback-icon">📊</div>
  <img class="foto" src="{{IMAGEM_URL}}" onerror="this.style.display='none'">
  <div class="overlay"></div>

  <!-- topbar -->
  <div class="topbar">
    <div class="brand-pill">
      <div class="brand-logo">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="10" r="7" fill="none" stroke="#fff" stroke-width="2"/>
          <line x1="14" y1="3" x2="14" y2="1" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="7" y1="10" x2="5" y2="10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="23" y1="10" x2="21" y2="10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <rect x="7" y="16" width="3.5" height="6" rx="1" fill="#fff"/>
          <rect x="12" y="13" width="3.5" height="9" rx="1" fill="#fff"/>
          <rect x="17" y="10" width="3.5" height="12" rx="1" fill="#fff"/>
          <path d="M7 19 Q14 11 21 12" fill="none" stroke="#f0c060" stroke-width="1.8" stroke-linecap="round"/>
          <polygon points="21,9.5 24,13 18,12.5" fill="#f0c060"/>
        </svg>
      </div>
      <div class="brand-name">Bom Dia <span>Investidor</span></div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>AO VIVO</div>
  </div>

  <!-- painel inferior -->
  <div class="panel">
    <div class="accent-bar"></div>
    <div class="tag">{{CATEGORIA}}</div>
    <div class="headline">{{MANCHETE}}</div>
    <div class="divider"></div>
    <div class="bottom-row">
      <div class="source-info">
        <div class="source-label">Fonte</div>
        <div class="source-name">{{FONTE}}</div>
      </div>
      <div class="pergunta-box">
        <div class="pergunta-text">{{PERGUNTA}}</div>
      </div>
    </div>
  </div>

  <div class="watermark">bomdiainvestidor.com.br</div>

</div>
</body>
</html>
