<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; background: #080c16; }
  .card { width: 1080px; height: 1350px; position: relative; overflow: hidden; }

  .foto { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.82) saturate(1.1); }
  .fallback-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0d1b38 0%, #152952 60%, #0d1b38 100%); }
  .fallback-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 320px; opacity: 0.06; pointer-events: none; }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(5,8,18,0.10) 0%,
      rgba(5,8,18,0.15) 28%,
      rgba(5,8,18,0.62) 58%,
      rgba(5,8,18,0.98) 72%,
      #050812 100%
    );
  }

  /* ── TOPBAR ── */
  .topbar {
    position: absolute; top: 52px; left: 60px; right: 60px;
    display: flex; align-items: center; justify-content: space-between; z-index: 10;
  }
  .brand-pill {
    background: rgba(255,255,255,0.96);
    border-radius: 60px;
    padding: 10px 24px 10px 10px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .brand-pill img { height: 52px; width: auto; display: block; border-radius: 50%; }
  .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
  .brand-text .t1 { font-size: 18px; font-weight: 900; color: #1a2f5e; letter-spacing: 0.5px; }
  .brand-text .t2 { font-size: 14px; font-weight: 700; color: #c9920a; letter-spacing: 1px; text-transform: uppercase; }

  .live-badge {
    display: flex; align-items: center; gap: 10px;
    background: rgba(5,8,18,0.65); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 60px;
    padding: 12px 22px; font-size: 19px; font-weight: 700;
    color: rgba(255,255,255,0.80); letter-spacing: 2px; text-transform: uppercase;
  }
  .live-dot { width: 10px; height: 10px; border-radius: 50%; background: #c9920a; }

  /* ── PAINEL INFERIOR ── */
  .panel {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 52px 64px 60px; z-index: 10;
    display: flex; flex-direction: column; gap: 26px;
  }
  .accent-bar {
    position: absolute; left: 0; top: 52px; bottom: 60px;
    width: 6px; border-radius: 0 4px 4px 0;
    background: {{ACENTO_COR}};
  }
  .tag {
    align-self: flex-start;
    background: {{ACENTO_GRADIENTE}}; color: {{ACENTO_TEXTO}};
    font-size: 21px; font-weight: 800; padding: 10px 28px;
    border-radius: 6px; letter-spacing: 2px; text-transform: uppercase;
  }
  .headline {
    font-size: 68px; font-weight: 900; color: #fff;
    line-height: 1.10; letter-spacing: -1px;
    max-height: 370px; overflow: hidden;
  }
  .divider { height: 1px; background: rgba(255,255,255,0.12); }
  .bottom-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; }
  .source-info { display: flex; flex-direction: column; gap: 6px; }
  .source-label { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.38); text-transform: uppercase; letter-spacing: 2px; }
  .source-name { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.65); }
  .pergunta-box {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 16px 24px; max-width: 520px;
  }
  .pergunta-text { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.85); line-height: 1.3; }

  .watermark { position: absolute; right: 64px; bottom: 20px; font-size: 17px; font-weight: 600; color: rgba(255,255,255,0.20); letter-spacing: 0.5px; z-index: 10; }
</style>
</head>
<body>
<div class="card">
  <div class="fallback-bg"></div>
  <div class="fallback-icon">📊</div>
  <img class="foto" src="{{IMAGEM_URL}}" onerror="this.style.display='none'">
  <div class="overlay"></div>

  <div class="topbar">
    <div class="brand-pill">
      <img src="logo-bdi.jpeg" alt="BDI">
      <div class="brand-text">
        <span class="t1">BOM DIA INVESTIDOR</span>
        <span class="t2">Informação · Estratégia</span>
      </div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>AO VIVO</div>
  </div>

  <div class="panel">
    <div class="accent-bar"></div>
    <div class="tag">{{CATEGORIA}}</div>
    <div class="headline">{{MANCHETE}}</div>
    <div class="divider"></div>
    <div class="bottom-row">
      <div class="source-info">
        <div class="source-label">Fonte</div>
        <div class="source-name">{{FONTE}}</div>
      </div>
      <div class="pergunta-box">
        <div class="pergunta-text">{{PERGUNTA}}</div>
      </div>
    </div>
  </div>

  <div class="watermark">bomdiainvestidor.com.br</div>
</div>
</body>
</html>
