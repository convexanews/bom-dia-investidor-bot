<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; background: #ffffff; }
  .card { width: 1080px; height: 1350px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 44px; padding: 90px; background: #fff; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 10px; background: linear-gradient(90deg, #c9920a, #e8b93c, #c9920a); }
  .card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 10px; background: linear-gradient(90deg, #c9920a, #e8b93c, #c9920a); }

  .logo-anel { width: 210px; height: 210px; border-radius: 50%; padding: 8px; background: linear-gradient(135deg, #c9920a, #e8b93c); box-shadow: 0 10px 34px rgba(201,146,10,0.30); }
  .logo-anel img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 6px solid #fff; }

  .titulo { font-size: 62px; font-weight: 900; color: #0f172a; text-align: center; letter-spacing: -1px; line-height: 1.15; }
  .sub { font-size: 28px; font-weight: 600; color: #64748b; text-align: center; line-height: 1.6; max-width: 760px; }

  .handle {
    display: flex; align-items: center; gap: 16px;
    font-size: 34px; font-weight: 800; color: #fff;
    background: #0f172a; padding: 26px 54px; border-radius: 999px;
    box-shadow: 0 8px 26px rgba(15,23,42,0.25);
  }
  .handle .ig { width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 30% 110%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }

  .site { position: absolute; bottom: 56px; font-size: 24px; font-weight: 700; color: #c9920a; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-anel"><img src="{{LOGO_B64}}" alt=""></div>
  <div class="titulo">Gostou do conteúdo?</div>
  <div class="sub">Notícias do mercado, fechamento diário e educação financeira — todos os dias, direto no seu feed.</div>
  <div class="handle">
    <span class="ig">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.3" cy="6.7" r="1.2" fill="#fff" stroke="none"/></svg>
    </span>
    Siga @bomdia_investidor
  </div>
  <div class="site">bomdiainvestidor.com.br</div>
</div>
</body>
</html>
