<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #070b14;
  }

  .card {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #060a13 0%, #0b1626 45%, #060a13 100%);
  }

  /* ícone decorativo de fundo, usado quando não há foto */
  .fallback {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 380px;
    opacity: 0.12;
  }

  .foto {
    position: absolute;
    top: 0; left: 0; right: 0;
    width: 1080px; height: 1920px;
    object-fit: cover;
  }

  /* degradê escuro pra garantir leitura do texto sobre a foto */
  .degrade {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 900px;
    background: linear-gradient(180deg, rgba(6,10,19,0) 0%, rgba(6,10,19,0.55) 40%, rgba(6,10,19,0.97) 100%);
  }

  /* marca no topo - abaixo da área de UI do Instagram (avatar/perfil) */
  .topbar {
    position: absolute;
    top: 220px; left: 50px;
    z-index: 3;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(6,10,19,0.55);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 10px 22px 10px 14px;
  }
  .brand .icone {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
  }
  .brand .icone img {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .brand .nome {
    font-size: 24px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: 0.3px;
  }
  .brand .nome span { color: #00D184; }

  /* bloco de conteúdo ancorado na base, fora da área de UI do Instagram (resposta/swipe up) */
  .conteudo {
    position: absolute;
    left: 50px; right: 50px; bottom: 260px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    z-index: 3;
  }

  /* tag de categoria */
  .tag {
    align-self: flex-start;
    background: linear-gradient(135deg, #00D184, #00A8E8);
    color: #04150f;
    font-size: 26px;
    font-weight: 800;
    padding: 14px 34px;
    border-radius: 50px;
    letter-spacing: 1px;
  }

  /* manchete sobre a foto */
  .manchete {
    color: #ffffff;
    font-size: 68px;
    font-weight: 900;
    line-height: 1.18;
    text-transform: uppercase;
    max-height: 500px;
    overflow: hidden;
    text-shadow: 0 4px 18px rgba(0,0,0,.5);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="fallback">📊</div>
    <img class="foto" src="{{IMAGEM_URL}}" onerror="this.style.display='none'">
    <div class="degrade"></div>

    <div class="topbar">
      <div class="brand">
        <div class="icone"><img src="logo-bdi-icon.png"></div>
        <div class="nome">Bom Dia <span>Investidor</span></div>
      </div>
    </div>

    <div class="conteudo">
      <div class="tag">{{CATEGORIA}}</div>
      <div class="manchete">{{MANCHETE}}</div>
    </div>
  </div>
</body>
</html>
