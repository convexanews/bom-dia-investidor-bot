<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; background: #080c16; }
  .card { width: 1080px; height: 1920px; position: relative; overflow: hidden; }

  .foto { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.78) saturate(1.15); }
  .fallback-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0d1b38 0%, #152952 60%, #0d1b38 100%); }
  .fallback-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 400px; opacity: 0.06; pointer-events: none; }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(5,8,18,0.08) 0%,
      rgba(5,8,18,0.10) 25%,
      rgba(5,8,18,0.52) 55%,
      rgba(5,8,18,0.97) 70%,
      #050812 100%
    );
  }

  .topbar {
    position: absolute; top: 200px; left: 64px; right: 64px;
    display: flex; align-items: center; justify-content: space-between; z-index: 10;
  }
  .brand-pill {
    background: rgba(255,255,255,0.96); border-radius: 60px;
    padding: 12px 28px 12px 12px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.35);
  }
  .brand-pill img { height: 60px; width: auto; display: block; border-radius: 50%; }
  .brand-text .t1 { font-size: 20px; font-weight: 900; color: #1a2f5e; letter-spacing: 0.5px; display: block; }
  .brand-text .t2 { font-size: 15px; font-weight: 700; color: #c9920a; letter-spacing: 1px; text-transform: uppercase; display: block; }

  .live-badge {
    display: flex; align-items: center; gap: 10px;
    background: rgba(5,8,18,0.65); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 60px;
    padding: 14px 26px; font-size: 22px; font-weight: 700;
    color: rgba(255,255,255,0.80); letter-spacing: 2px; text-transform: uppercase;
  }
  .live-dot { width: 12px; height: 12px; border-radius: 50%; background: #c9920a; }

  .panel {
    position: absolute; left: 0; right: 0; bottom: 220px;
    padding: 60px 70px 60px; z-index: 10;
    display: flex; flex-direction: column; gap: 30px;
  }
  .accent-bar { position: absolute; left: 0; top: 60px; bottom: 60px; width: 7px; border-radius: 0 5px 5px 0; background: {{ACENTO_COR}}; }
  .tag {
    align-self: flex-start;
    background: {{ACENTO_GRADIENTE}}; color: {{ACENTO_TEXTO}};
    font-size: 24px; font-weight: 800; padding: 12px 32px;
    border-radius: 6px; letter-spacing: 2px; text-transform: uppercase;
  }
  .headline { font-size: 76px; font-weight: 900; color: #fff; line-height: 1.08; letter-spacing: -1.5px; max-height: 500px; overflow: hidden; }
  .divider { height: 1px; background: rgba(255,255,255,0.12); }
  .bottom-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }
  .source-info { display: flex; flex-direction: column; gap: 8px; }
  .source-label { font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.38); text-transform: uppercase; letter-spacing: 2px; }
  .source-name { font-size: 26px; font-weight: 700; color: rgba(255,255,255,0.65); }
  .swipe-box { display: flex; align-items: center; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.16); border-radius: 16px; padding: 20px 28px; }
  .swipe-text { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.80); line-height: 1.3; }

  .watermark { position: absolute; right: 70px; bottom: 196px; font-size: 19px; font-weight: 600; color: rgba(255,255,255,0.20); letter-spacing: 0.5px; z-index: 10; }
</style>
</head>
<body>
<div class="card">
  <div class="fallback-bg"></div>
  <div class="fallback-icon">📊</div>
  <img class="foto" src="{{IMAGEM_URL}}" onerror="this.style.display='none'">
  <div class="overlay"></div>

  <div class="topbar">
    <div class="brand-pill">
      <img src="logo-bdi.jpeg" alt="BDI">
      <div class="brand-text">
        <span class="t1">BOM DIA INVESTIDOR</span>
        <span class="t2">Informação · Estratégia</span>
      </div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>AO VIVO</div>
  </div>

  <div class="panel">
    <div class="accent-bar"></div>
    <div class="tag">{{CATEGORIA}}</div>
    <div class="headline">{{MANCHETE}}</div>
    <div class="divider"></div>
    <div class="bottom-row">
      <div class="source-info">
        <div class="source-label">Fonte</div>
        <div class="source-name">{{FONTE}}</div>
      </div>
      <div class="swipe-box">
        <div class="swipe-text">Ver notícia completa 👆</div>
      </div>
    </div>
  </div>

  <div class="watermark">bomdiainvestidor.com.br</div>
</div>
</body>
</html>
