<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px; overflow: hidden;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    background: #080c16;
  }
  .card { width: 1080px; height: 1350px; display: flex; flex-direction: column; position: relative; overflow: hidden; }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #0a1628 0%, #1a2f5e 65%, #0d1f45 100%);
    padding: 54px 72px 50px; flex-shrink:0; position:relative; overflow:hidden;
  }
  .deco { position:absolute; border-radius:50%; pointer-events:none; }
  .deco1 { right:-100px; top:-100px; width:420px; height:420px; background:rgba(201,146,10,0.09); }
  .deco2 { left:-60px; bottom:-60px; width:220px; height:220px; background:rgba(201,146,10,0.05); }

  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:36px; position:relative; z-index:2; }
  .brand-pill {
    display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
    border-radius:60px; padding:12px 26px 12px 16px;
  }
  .brand-logo { width:46px; height:46px; border-radius:50%; background:#c9920a; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .brand-logo svg { width:28px; height:28px; }
  .brand-name { font-size:22px; font-weight:800; color:#fff; }
  .brand-name span { color:#f0c060; }

  .close-badge {
    display:flex; align-items:center; gap:10px;
    background:rgba(201,146,10,0.16); border:1.5px solid rgba(201,146,10,0.35);
    border-radius:60px; padding:12px 24px;
    font-size:18px; font-weight:800; color:#f0c060;
    letter-spacing:2px; text-transform:uppercase;
  }
  .cb-dot { width:9px; height:9px; border-radius:50%; background:#f0c060; }

  .header-titulo { font-size:80px; font-weight:900; color:#fff; line-height:1.05; letter-spacing:-1.5px; position:relative; z-index:2; }
  .header-sub { font-size:26px; color:#c9a24a; margin-top:14px; font-weight:600; position:relative; z-index:2; }

  /* barra dourada */
  .gold-bar { height:5px; background:linear-gradient(90deg,#c9920a,#f0c060 50%,#c9920a); flex-shrink:0; }

  /* ── CORPO com fundo branco ── */
  .body { flex:1; background:#fff; padding:44px 72px 0; display:flex; flex-direction:column; gap:0; }

  .ativo {
    display:flex; align-items:center; justify-content:space-between;
    padding:34px 0; border-bottom:1px solid #f1f5f9;
  }
  .ativo:last-child { border-bottom:none; }

  .ativo-left { display:flex; align-items:center; gap:24px; }
  .ativo-icon {
    width:80px; height:80px; border-radius:20px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    font-size:38px;
  }
  .ic-ibov { background:#eef2fb; }
  .ic-dolar { background:#fef8ec; }
  .ic-btc { background:#fff4ec; }

  .ativo-info { display:flex; flex-direction:column; gap:4px; }
  .ativo-nome { font-size:19px; color:#94a3b8; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
  .ativo-valor { font-size:52px; font-weight:900; color:#0f172a; line-height:1.05; letter-spacing:-1px; }

  .var-pill {
    font-size:28px; font-weight:800;
    padding:12px 28px; border-radius:12px;
    display:flex; align-items:center; gap:8px;
  }

  /* ── FOOTER ── */
  .footer {
    padding:22px 72px; background:#f8fafc; border-top:1px solid #f1f5f9;
    display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
  }
  .footer-data { font-size:20px; color:#94a3b8; font-weight:500; }
  .footer-handle { font-size:20px; font-weight:700; color:#c9920a; }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="deco deco1"></div><div class="deco deco2"></div>
    <div class="header-top">
      <div class="brand-pill">
        <div class="brand-logo">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="10" r="7" fill="none" stroke="#fff" stroke-width="2"/>
            <line x1="14" y1="3" x2="14" y2="1" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="7" y1="10" x2="5" y2="10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="23" y1="10" x2="21" y2="10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
            <rect x="7" y="16" width="3.5" height="6" rx="1" fill="#fff"/>
            <rect x="12" y="13" width="3.5" height="9" rx="1" fill="#fff"/>
            <rect x="17" y="10" width="3.5" height="12" rx="1" fill="#fff"/>
            <path d="M7 19 Q14 11 21 12" fill="none" stroke="#f0c060" stroke-width="1.8" stroke-linecap="round"/>
            <polygon points="21,9.5 24,13 18,12.5" fill="#f0c060"/>
          </svg>
        </div>
        <div class="brand-name">Bom Dia <span>Investidor</span></div>
      </div>
      <div class="close-badge"><div class="cb-dot"></div>FECHAMENTO</div>
    </div>
    <div class="header-titulo">Fechamento<br>do Mercado</div>
    <div class="header-sub">{{DATA_EXTENSO}}</div>
  </div>

  <div class="gold-bar"></div>

  <div class="body">
    <div class="ativo">
      <div class="ativo-left">
        <div class="ativo-icon ic-ibov">📈</div>
        <div class="ativo-info">
          <div class="ativo-nome">Ibovespa</div>
          <div class="ativo-valor">{{IBOV_VALOR}}</div>
        </div>
      </div>
      <div class="var-pill" style="background:{{IBOV_BG}};color:{{IBOV_COR}};">{{IBOV_VAR}}</div>
    </div>

    <div class="ativo">
      <div class="ativo-left">
        <div class="ativo-icon ic-dolar">💵</div>
        <div class="ativo-info">
          <div class="ativo-nome">Dólar</div>
          <div class="ativo-valor">{{DOLAR_VALOR}}</div>
        </div>
      </div>
      <div class="var-pill" style="background:{{DOLAR_BG}};color:{{DOLAR_COR}};">{{DOLAR_VAR}}</div>
    </div>

    <div class="ativo">
      <div class="ativo-left">
        <div class="ativo-icon ic-btc">₿</div>
        <div class="ativo-info">
          <div class="ativo-nome">Bitcoin</div>
          <div class="ativo-valor">{{BTC_VALOR}}</div>
        </div>
      </div>
      <div class="var-pill" style="background:{{BTC_BG}};color:{{BTC_COR}};">{{BTC_VAR}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-data">bomdiainvestidor.com.br</div>
    <div class="footer-handle">@bomdia_investidor</div>
  </div>

</div>
</body>
</html>
