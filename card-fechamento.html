<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
  .card { width: 1080px; height: 1350px; display: flex; flex-direction: column; overflow: hidden; }

  .header {
    background: linear-gradient(135deg, #0a1628 0%, #1a2f5e 65%, #0d1f45 100%);
    padding: 50px 72px 46px; flex-shrink: 0; position: relative; overflow: hidden;
  }
  .deco { position: absolute; border-radius: 50%; pointer-events: none; }
  .deco1 { right: -100px; top: -100px; width: 420px; height: 420px; background: rgba(201,146,10,0.09); }
  .deco2 { left: -60px; bottom: -60px; width: 220px; height: 220px; background: rgba(201,146,10,0.05); }

  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; position: relative; z-index: 2; }

  .logo-wrap { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 8px 20px 8px 8px; display: flex; align-items: center; gap: 12px; }
  .logo-wrap img { height: 56px; width: auto; display: block; border-radius: 8px; }
  .logo-wrap .lt1 { font-size: 19px; font-weight: 900; color: #1a2f5e; display: block; line-height: 1.1; }
  .logo-wrap .lt2 { font-size: 13px; font-weight: 700; color: #c9920a; letter-spacing: 1px; text-transform: uppercase; display: block; }

  .close-badge {
    display: flex; align-items: center; gap: 10px;
    background: rgba(201,146,10,0.16); border: 1.5px solid rgba(201,146,10,0.35);
    border-radius: 60px; padding: 12px 24px;
    font-size: 18px; font-weight: 800; color: #f0c060;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .cb-dot { width: 9px; height: 9px; border-radius: 50%; background: #f0c060; }

  .header-titulo { font-size: 76px; font-weight: 900; color: #fff; line-height: 1.05; letter-spacing: -1.5px; position: relative; z-index: 2; }
  .header-sub { font-size: 24px; color: #c9a24a; margin-top: 12px; font-weight: 600; position: relative; z-index: 2; }

  .gold-bar { height: 5px; background: linear-gradient(90deg,#c9920a,#f0c060 50%,#c9920a); flex-shrink: 0; }

  .body { flex: 1; background: #fff; padding: 40px 72px 0; display: flex; flex-direction: column; }

  .ativo { display: flex; align-items: center; justify-content: space-between; padding: 30px 0; border-bottom: 1px solid #f1f5f9; }
  .ativo:last-child { border-bottom: none; }
  .ativo-left { display: flex; align-items: center; gap: 22px; }
  .ativo-icon { width: 76px; height: 76px; border-radius: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 36px; }
  .ic-ibov { background: #eef2fb; }
  .ic-dolar { background: #fef8ec; }
  .ic-btc { background: #fff4ec; }
  .ativo-info { display: flex; flex-direction: column; gap: 4px; }
  .ativo-nome { font-size: 18px; color: #94a3b8; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .ativo-valor { font-size: 50px; font-weight: 900; color: #0f172a; line-height: 1.05; letter-spacing: -1px; }
  .var-pill { font-size: 27px; font-weight: 800; padding: 12px 26px; border-radius: 12px; }

  .footer { padding: 20px 72px; background: #f8fafc; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .footer-site { font-size: 19px; color: #94a3b8; font-weight: 500; }
  .footer-handle { font-size: 19px; font-weight: 700; color: #c9920a; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="deco deco1"></div><div class="deco deco2"></div>
    <div class="header-top">
      <div class="logo-wrap">
        <img src="logo-bdi.jpeg" alt="BDI">
        <div><span class="lt1">BOM DIA INVESTIDOR</span><span class="lt2">Informação · Estratégia</span></div>
      </div>
      <div class="close-badge"><div class="cb-dot"></div>FECHAMENTO</div>
    </div>
    <div class="header-titulo">Fechamento<br>do Mercado</div>
    <div class="header-sub">{{DATA_EXTENSO}}</div>
  </div>

  <div class="gold-bar"></div>

  <div class="body">
    <div class="ativo">
      <div class="ativo-left">
        <div class="ativo-icon ic-ibov">📈</div>
        <div class="ativo-info">
          <div class="ativo-nome">Ibovespa</div>
          <div class="ativo-valor">{{IBOV_VALOR}}</div>
        </div>
      </div>
      <div class="var-pill" style="background:{{IBOV_BG}};color:{{IBOV_COR}};">{{IBOV_VAR}}</div>
    </div>
    <div class="ativo">
      <div class="ativo-left">
        <div class="ativo-icon ic-dolar">💵</div>
        <div class="ativo-info">
          <div class="ativo-nome">Dólar</div>
          <div class="ativo-valor">{{DOLAR_VALOR}}</div>
        </div>
      </div>
      <div class="var-pill" style="background:{{DOLAR_BG}};color:{{DOLAR_COR}};">{{DOLAR_VAR}}</div>
    </div>
    <div class="ativo">
      <div class="ativo-left">
        <div class="ativo-icon ic-btc">₿</div>
        <div class="ativo-info">
          <div class="ativo-nome">Bitcoin</div>
          <div class="ativo-valor">{{BTC_VALOR}}</div>
        </div>
      </div>
      <div class="var-pill" style="background:{{BTC_BG}};color:{{BTC_COR}};">{{BTC_VAR}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-site">bomdiainvestidor.com.br</div>
    <div class="footer-handle">@bomdia_investidor</div>
  </div>
</div>
</body>
</html>
