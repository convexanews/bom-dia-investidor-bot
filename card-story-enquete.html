<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; background: #080c16; }
  .card {
    width: 1080px; height: 1920px; position: relative; overflow: hidden;
    background: linear-gradient(160deg, #080e1e 0%, #0f1c3a 50%, #080e1e 100%);
    display: flex; flex-direction: column; align-items: center;
  }

  .deco { position: absolute; border-radius: 50%; pointer-events: none; }
  .deco1 { right: -140px; top: -140px; width: 560px; height: 560px; background: rgba(201,146,10,0.06); }
  .deco2 { left: -80px; bottom: 300px; width: 340px; height: 340px; background: rgba(201,146,10,0.04); }

  .top-bar { width: 100%; height: 4px; background: linear-gradient(90deg,#c9920a,#f0c060 50%,#c9920a); flex-shrink: 0; }

  .content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 80px 260px; width: 100%;
    position: relative; z-index: 2;
  }

  /* logo real sobre fundo escuro — caixa branca */
  .logo-wrap {
    background: rgba(255,255,255,0.97); border-radius: 20px;
    padding: 12px 28px 12px 12px;
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 44px; align-self: center;
    box-shadow: 0 4px 32px rgba(0,0,0,0.4);
  }
  .logo-wrap img { height: 64px; width: auto; display: block; border-radius: 10px; }
  .logo-wrap .lt1 { font-size: 22px; font-weight: 900; color: #1a2f5e; display: block; line-height: 1.1; }
  .logo-wrap .lt2 { font-size: 15px; font-weight: 700; color: #c9920a; letter-spacing: 1px; text-transform: uppercase; display: block; }

  .enquete-badge {
    display: flex; align-items: center; gap: 12px;
    background: rgba(201,146,10,0.14); border: 1.5px solid rgba(201,146,10,0.32);
    border-radius: 60px; padding: 14px 32px;
    font-size: 20px; font-weight: 800; color: #f0c060;
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 40px;
  }
  .e-dot { width: 10px; height: 10px; border-radius: 50%; background: #f0c060; }

  .pergunta-box {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 24px; padding: 48px 52px;
    text-align: center; margin-bottom: 44px;
  }
  .pergunta-icon { font-size: 68px; margin-bottom: 22px; display: block; }
  .pergunta-text { font-size: 50px; font-weight: 900; color: #fff; line-height: 1.18; letter-spacing: -0.5px; }

  .opcoes { display: flex; flex-direction: column; gap: 22px; width: 100%; margin-bottom: 48px; }
  .opcao { display: flex; align-items: center; gap: 24px; border-radius: 20px; padding: 34px 42px; }
  .opcao-a { background: rgba(0,200,130,0.12); border: 2.5px solid #00C882; }
  .opcao-b { background: rgba(255,68,68,0.12); border: 2.5px solid #FF4444; }
  .opcao-icon { font-size: 42px; flex-shrink: 0; }
  .opcao-text { color: #fff; font-size: 36px; font-weight: 800; line-height: 1.2; }

  .cta { font-size: 25px; color: rgba(255,255,255,0.45); text-align: center; font-weight: 500; }
  .cta strong { color: #f0c060; font-weight: 700; }

  .footer {
    position: absolute; bottom: 68px; left: 80px; right: 80px;
    display: flex; justify-content: space-between; align-items: center; z-index: 4;
  }
  .footer-data { font-size: 20px; color: rgba(255,255,255,0.28); font-weight: 500; }
  .footer-handle { font-size: 20px; font-weight: 700; color: #c9920a; }
</style>
</head>
<body>
<div class="card">
  <div class="deco deco1"></div>
  <div class="deco deco2"></div>
  <div class="top-bar"></div>

  <div class="content">
    <div class="logo-wrap">
      <img src="logo-bdi.jpeg" alt="BDI">
      <div><span class="lt1">BOM DIA INVESTIDOR</span><span class="lt2">Enquete do Dia</span></div>
    </div>

    <div class="enquete-badge"><div class="e-dot"></div>VOTE AGORA</div>

    <div class="pergunta-box">
      <span class="pergunta-icon">{{ICONE}}</span>
      <div class="pergunta-text">{{PERGUNTA}}</div>
    </div>

    <div class="opcoes">
      <div class="opcao opcao-a">
        <span class="opcao-icon">{{ICONE_A}}</span>
        <span class="opcao-text">{{OPCAO_A}}</span>
      </div>
      <div class="opcao opcao-b">
        <span class="opcao-icon">{{ICONE_B}}</span>
        <span class="opcao-text">{{OPCAO_B}}</span>
      </div>
    </div>

    <div class="cta">Comente sua resposta! <strong>👇</strong></div>
  </div>

  <div class="footer">
    <div class="footer-data">{{DATA}}</div>
    <div class="footer-handle">@bomdia_investidor</div>
  </div>
</div>
</body>
</html>
