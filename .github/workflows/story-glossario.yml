name: Bom Dia Investidor - Story Glossário

on:
  schedule:
    - cron: '0 11 * * *'  # Todo dia às 8h BRT (11h UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bdi-glossario
  cancel-in-progress: false

jobs:
  glossario:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Gerar e publicar story do glossário
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-story-glossario.cjs

      - name: Salvar registro
        if: always()
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add verificacoes.json
          git diff --cached --quiet || git commit -m "Atualiza registro do story de glossario"
          git pull --rebase origin main
          git push
