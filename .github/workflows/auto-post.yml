name: Bom Dia Investidor - Auto Post

on:
  schedule:
    - cron: '*/30 * * * *'
  repository_dispatch:
    types: [auto-post]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: |
          npm install
          sudo apt-get update && sudo apt-get install -y ffmpeg \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64
          pip install edge-tts

      - name: Executar verificacao e publicacao automatica
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-post.cjs

      - name: Salvar relatorio e historico de postagens
        if: always()
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add noticias-postadas.json relatorio.json verificacoes.json tiktok-postadas.json
          git diff --cached --quiet || git commit -m "Atualiza registro de postagens automaticas"
          git push

      - name: Verificar se deve gerar reel (12h BRT = 15h UTC ou 20h BRT = 23h UTC)
        id: check_reel
        run: |
          HORA_UTC=$(date -u +%H)
          HORA_UTC_NUM=$((10#$HORA_UTC))
          # 15h UTC = 12h BRT (reel do meio-dia) ou 23h UTC = 20h BRT (reel noturno)
          if [ "$HORA_UTC_NUM" -eq 15 ] || [ "$HORA_UTC_NUM" -eq 23 ]; then
            # Verifica se ja postou reel nas ultimas 4h (evita duplo post, mas permite 2 por dia)
            JA_FEZ=$(node -e "
              const fs = require('fs');
              const v = JSON.parse(fs.readFileSync('verificacoes.json','utf8'));
              const quatro_horas = 4 * 60 * 60 * 1000;
              const feito = v.some(e => e.resultado === 'reel_postado' && (Date.now() - new Date(e.data).getTime()) < quatro_horas);
              console.log(feito ? 'sim' : 'nao');
            ")
            echo "hora_certa=true" >> $GITHUB_OUTPUT
            echo "ja_fez=$JA_FEZ" >> $GITHUB_OUTPUT
          else
            echo "hora_certa=false" >> $GITHUB_OUTPUT
            echo "ja_fez=nao" >> $GITHUB_OUTPUT
          fi

      - name: Instalar ffmpeg para reel
        if: steps.check_reel.outputs.hora_certa == 'true' && steps.check_reel.outputs.ja_fez == 'nao'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Gerar e publicar reel do dia
        if: steps.check_reel.outputs.hora_certa == 'true' && steps.check_reel.outputs.ja_fez == 'nao'
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-reel.cjs

      - name: Salvar registro do reel
        if: steps.check_reel.outputs.hora_certa == 'true' && steps.check_reel.outputs.ja_fez == 'nao'
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add verificacoes.json
          git diff --cached --quiet || git commit -m "Atualiza registro do reel diario"
          git push

      - name: Verificar se deve gerar carrossel de fechamento (21h UTC = 18h BRT, seg-sex)
        id: check_carrossel
        run: |
          HORA_UTC=$(date -u +%H)
          HORA_UTC_NUM=$((10#$HORA_UTC))
          DIA_SEMANA=$(date -u +%u)
          if [ "$HORA_UTC_NUM" -eq 21 ] && [ "$DIA_SEMANA" -le 5 ]; then
            JA_FEZ=$(node -e "
              const fs = require('fs');
              const v = JSON.parse(fs.readFileSync('verificacoes.json','utf8'));
              const seis_horas = 6 * 60 * 60 * 1000;
              const feito = v.some(e => e.resultado === 'carrossel_fechamento' && (Date.now() - new Date(e.data).getTime()) < seis_horas);
              console.log(feito ? 'sim' : 'nao');
            ")
            echo "hora_certa=true" >> $GITHUB_OUTPUT
            echo "ja_fez=$JA_FEZ" >> $GITHUB_OUTPUT
          else
            echo "hora_certa=false" >> $GITHUB_OUTPUT
            echo "ja_fez=nao" >> $GITHUB_OUTPUT
          fi

      - name: Gerar e publicar carrossel de fechamento (fallback)
        if: steps.check_carrossel.outputs.hora_certa == 'true' && steps.check_carrossel.outputs.ja_fez == 'nao'
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-carrossel-fechamento.cjs

      - name: Salvar registro do carrossel (fallback)
        if: steps.check_carrossel.outputs.hora_certa == 'true' && steps.check_carrossel.outputs.ja_fez == 'nao'
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add verificacoes.json
          git diff --cached --quiet || git commit -m "Atualiza registro do carrossel de fechamento"
          git push

      - name: Verificar se deve postar story de enquete (9h UTC = 6h BRT)
        id: check_enquete
        run: |
          HORA_UTC=$(date -u +%H)
          HORA_UTC_NUM=$((10#$HORA_UTC))
          if [ "$HORA_UTC_NUM" -eq 9 ]; then
            JA_FEZ=$(node -e "
              const fs = require('fs');
              const v = JSON.parse(fs.readFileSync('verificacoes.json','utf8'));
              const seis_horas = 6 * 60 * 60 * 1000;
              const feito = v.some(e => e.resultado === 'story_enquete' && (Date.now() - new Date(e.data).getTime()) < seis_horas);
              console.log(feito ? 'sim' : 'nao');
            ")
            echo "hora_certa=true" >> $GITHUB_OUTPUT
            echo "ja_fez=$JA_FEZ" >> $GITHUB_OUTPUT
          else
            echo "hora_certa=false" >> $GITHUB_OUTPUT
            echo "ja_fez=nao" >> $GITHUB_OUTPUT
          fi

      - name: Publicar story de enquete (fallback)
        if: steps.check_enquete.outputs.hora_certa == 'true' && steps.check_enquete.outputs.ja_fez == 'nao'
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-story-enquete.cjs

      - name: Salvar registro do story de enquete (fallback)
        if: steps.check_enquete.outputs.hora_certa == 'true' && steps.check_enquete.outputs.ja_fez == 'nao'
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add verificacoes.json
          git diff --cached --quiet || git commit -m "Atualiza registro do story de enquete"
          git push

      - name: Verificar se deve postar carrossel educativo (13h UTC = 10h BRT, segunda)
        id: check_educativo
        run: |
          HORA_UTC=$(date -u +%H)
          HORA_UTC_NUM=$((10#$HORA_UTC))
          DIA_SEMANA=$(date -u +%u)
          if [ "$HORA_UTC_NUM" -eq 13 ] && [ "$DIA_SEMANA" -eq 1 ]; then
            JA_FEZ=$(node -e "
              const fs = require('fs');
              const v = JSON.parse(fs.readFileSync('verificacoes.json','utf8'));
              const seis_horas = 6 * 60 * 60 * 1000;
              const feito = v.some(e => e.resultado === 'carrossel_educativo' && (Date.now() - new Date(e.data).getTime()) < seis_horas);
              console.log(feito ? 'sim' : 'nao');
            ")
            echo "hora_certa=true" >> $GITHUB_OUTPUT
            echo "ja_fez=$JA_FEZ" >> $GITHUB_OUTPUT
          else
            echo "hora_certa=false" >> $GITHUB_OUTPUT
            echo "ja_fez=nao" >> $GITHUB_OUTPUT
          fi

      - name: Publicar carrossel educativo (fallback)
        if: steps.check_educativo.outputs.hora_certa == 'true' && steps.check_educativo.outputs.ja_fez == 'nao'
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-carrossel-educativo.cjs

      - name: Salvar registro do carrossel educativo (fallback)
        if: steps.check_educativo.outputs.hora_certa == 'true' && steps.check_educativo.outputs.ja_fez == 'nao'
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add verificacoes.json
          git diff --cached --quiet || git commit -m "Atualiza registro do carrossel educativo"
          git push
