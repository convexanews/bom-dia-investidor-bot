name: Bom Dia Investidor - Auto Post

on:
  schedule:
    - cron: '0 * * * *'
  repository_dispatch:
    types: [auto-post]
  workflow_dispatch: {}

permissions:
  contents: write

# Impede que duas execucoes rodem em paralelo (a cada 30min) — sem isso, se uma
# execucao demorar mais que o intervalo, a proxima comeca antes da primeira
# commitar o dedup, e a mesma noticia pode ser postada duas vezes.
concurrency:
  group: bdi-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: |
          npm install
          sudo apt-get update && sudo apt-get install -y ffmpeg \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64
          pip install edge-tts

      - name: Atualizar repositorio antes de rodar (evita dedup com dados velhos)
        run: git pull --rebase origin main || true

      - name: Executar verificacao e publicacao automatica
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-post.cjs

      - name: Salvar relatorio e historico de postagens
        if: always()
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add noticias-postadas.json relatorio.json verificacoes.json tiktok-postadas.json
          git diff --cached --quiet || git commit -m "Atualiza registro de postagens automaticas"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "Falha ao salvar estado apos 3 tentativas" && exit 1

      - name: Verificar se deve gerar reel do meio-dia (12h BRT = 15h UTC)
        id: check_reel
        run: |
          HORA_UTC=$(date -u +%H)
          HORA_UTC_NUM=$((10#$HORA_UTC))
          # So 15h UTC aqui — o reel noturno (23h UTC) ja tem workflow dedicado
          # (daily-reel.yml); manter os dois causava post duplicado do resumo do dia.
          if [ "$HORA_UTC_NUM" -eq 15 ]; then
            # Verifica se ja postou reel nas ultimas 4h (evita duplo post, mas permite 2 por dia)
            JA_FEZ=$(node -e "
              const fs = require('fs');
              const v = JSON.parse(fs.readFileSync('verificacoes.json','utf8'));
              const quatro_horas = 4 * 60 * 60 * 1000;
              const feito = v.some(e => e.resultado === 'reel_postado' && (Date.now() - new Date(e.data).getTime()) < quatro_horas);
              console.log(feito ? 'sim' : 'nao');
            ")
            echo "hora_certa=true" >> $GITHUB_OUTPUT
            echo "ja_fez=$JA_FEZ" >> $GITHUB_OUTPUT
          else
            echo "hora_certa=false" >> $GITHUB_OUTPUT
            echo "ja_fez=nao" >> $GITHUB_OUTPUT
          fi

      - name: Instalar ffmpeg para reel
        if: steps.check_reel.outputs.hora_certa == 'true' && steps.check_reel.outputs.ja_fez == 'nao'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Gerar e publicar reel do dia
        if: steps.check_reel.outputs.hora_certa == 'true' && steps.check_reel.outputs.ja_fez == 'nao'
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-reel.cjs

      - name: Salvar registro do reel
        if: steps.check_reel.outputs.hora_certa == 'true' && steps.check_reel.outputs.ja_fez == 'nao'
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add verificacoes.json
          git diff --cached --quiet || git commit -m "Atualiza registro do reel diario"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "Falha ao salvar estado apos 3 tentativas" && exit 1

      # Carrossel de fechamento e carrossel educativo tem workflows dedicados
      # (fechamento-mercado.yml e carrossel-educativo.yml) que rodam exatamente
      # nesses horarios. Ter um "fallback" aqui rodando no mesmo minuto causava
      # post duplicado: os dois liam verificacoes.json antes de qualquer um
      # commitar, viam "ainda nao fiz" e publicavam os dois.

      - name: Verificar alerta de recorde (Ibovespa, Dolar, Bitcoin)
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-alerta-recorde.cjs

      - name: Salvar registro do alerta de recorde
        if: always()
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add verificacoes.json alerta-recorde-estado.json
          git diff --cached --quiet || git commit -m "Atualiza registro de alerta de recorde"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "Falha ao salvar estado apos 3 tentativas" && exit 1
