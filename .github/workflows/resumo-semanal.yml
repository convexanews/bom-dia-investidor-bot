name: Bom Dia Investidor - Resumo Semanal

on:
  schedule:
    - cron: '0 13 * * 0'  # Todo domingo às 10h BRT (13h UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bdi-resumo-semanal
  cancel-in-progress: false

jobs:
  resumo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Gerar e publicar resumo semanal
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-carrossel-semanal.cjs

      - name: Salvar registro
        if: always()
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add verificacoes.json
          git diff --cached --quiet || git commit -m "Atualiza registro do resumo semanal"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "Falha ao salvar estado apos 3 tentativas" && exit 1
