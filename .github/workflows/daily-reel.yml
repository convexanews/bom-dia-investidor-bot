name: Bom Dia Investidor - Reel Diario

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bdi-reel
  cancel-in-progress: false

jobs:
  reel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Instalar dependencias
        run: npm install

      - name: Gerar e publicar o reel-resumo do dia
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: node auto-reel.cjs

      - name: Salvar registro do reel
        if: always()
        run: |
          git config user.email "bot@bomdiainvestidor.com.br"
          git config user.name "Bom Dia Investidor Bot"
          git add verificacoes.json
          git diff --cached --quiet || git commit -m "Atualiza registro do reel diario"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push && exit 0
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "Falha ao salvar estado apos 3 tentativas" && exit 1
