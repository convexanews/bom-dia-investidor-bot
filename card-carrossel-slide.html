<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; background: #ffffff; }
  .card { width: 1080px; height: 1350px; position: relative; display: flex; flex-direction: column; padding: 76px 88px 64px; background: #fff; }

  /* filete dourado no topo */
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 10px; background: linear-gradient(90deg, #c9920a, #e8b93c, #c9920a); }

  .topo { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 18px; }
  .brand img { height: 66px; width: 66px; border-radius: 50%; object-fit: cover; box-shadow: 0 2px 10px rgba(15,23,42,0.12); }
  .brand-text { display: flex; flex-direction: column; line-height: 1.15; }
  .brand-text .t1 { font-size: 24px; font-weight: 900; color: #0f172a; letter-spacing: 0.5px; }
  .brand-text .t2 { font-size: 14px; font-weight: 700; color: #c9920a; letter-spacing: 2.5px; text-transform: uppercase; }
  .contador {
    font-size: 24px; font-weight: 800; color: #9a7209;
    background: rgba(201,146,10,0.09); border: 1.5px solid rgba(201,146,10,0.35);
    padding: 12px 26px; border-radius: 999px;
  }

  .meio { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 40px; }
  .kicker {
    display: flex; align-items: center; gap: 18px;
    color: #c9920a; font-size: 26px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
  }
  .kicker::before { content: ''; width: 58px; height: 4px; background: #c9920a; border-radius: 2px; flex-shrink: 0; }
  .texto { font-size: 56px; line-height: 1.4; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; }

  .rodape { display: flex; align-items: center; justify-content: space-between; font-size: 22px; font-weight: 600; color: #94a3b8; }
  .arraste { color: #c9920a; font-weight: 800; }
</style>
</head>
<body>
<div class="card">
  <div class="topo">
    <div class="brand">
      <img src="{{LOGO_B64}}" alt="">
      <div class="brand-text">
        <span class="t1">BOM DIA INVESTIDOR</span>
        <span class="t2">Informação · Estratégia</span>
      </div>
    </div>
    <div class="contador">{{CONTADOR}}</div>
  </div>
  <div class="meio">
    <div class="kicker">{{KICKER}}</div>
    <div class="texto">{{TEXTO}}</div>
  </div>
  <div class="rodape">
    <span>bomdiainvestidor.com.br</span>
    <span class="arraste">{{RODAPE_DIREITA}}</span>
  </div>
</div>
</body>
</html>
