<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #fff; }
  .card { width: 1080px; height: 1350px; position: relative; background: #fff; display: flex; flex-direction: column; }

  .header {
    background: #1a2f5e;
    padding: 60px 80px 55px;
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .deco1 { position:absolute; right:-80px; top:-80px; width:360px; height:360px; border-radius:50%; background:rgba(201,146,10,0.10); }
  .deco2 { position:absolute; left:-40px; bottom:-60px; width:200px; height:200px; border-radius:50%; background:rgba(201,146,10,0.07); }

  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:44px; position:relative; z-index:2; }
  .logo-area { display:flex; align-items:center; gap:22px; }
  .logo-circle { width:76px; height:76px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .logo-text strong { font-size:24px; font-weight:900; color:#fff; display:block; }
  .logo-text span { font-size:17px; color:#c9a24a; font-weight:500; letter-spacing:1px; }
  .badge {
    font-size:19px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
    background:rgba(201,146,10,0.18); color:#f0c060;
    padding:12px 28px; border-radius:50px;
    border:2px solid rgba(201,146,10,0.4);
    display:flex; align-items:center; gap:10px;
    position:relative; z-index:2;
  }
  .badge-dot { width:10px; height:10px; border-radius:50%; background:#f0c060; }
  .icone-edu { font-size:64px; position:relative; z-index:2; margin-bottom:16px; }
  .header-titulo { font-size:72px; font-weight:900; color:#fff; line-height:1.1; position:relative; z-index:2; }
  .header-sub { font-size:24px; color:#c9a24a; margin-top:14px; font-weight:600; letter-spacing:0.3px; position:relative; z-index:2; }

  .gold-bar { height:8px; background:linear-gradient(90deg,#c9920a,#f0c060 50%,#c9920a); flex-shrink:0; }

  .body { padding:50px 80px 40px; display:flex; flex-direction:column; gap:28px; flex:1; overflow:hidden; }

  .conteudo-item {
    display:flex; align-items:flex-start; gap:24px;
    padding:30px 32px; border-radius:18px;
    background:#f8fafc; border-left:6px solid #c9920a;
  }
  .conteudo-num {
    width:52px; height:52px; border-radius:50%; background:#1a2f5e;
    color:#f0c060; font-size:24px; font-weight:900;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .conteudo-texto { flex:1; }
  .conteudo-titulo { font-size:26px; font-weight:800; color:#1a2f5e; margin-bottom:8px; line-height:1.2; }
  .conteudo-desc { font-size:22px; color:#475569; line-height:1.5; }

  .dica-box {
    background:linear-gradient(135deg, #1a2f5e, #243f7a);
    border-radius:18px; padding:30px 36px;
    display:flex; align-items:center; gap:20px; flex-shrink:0;
  }
  .dica-icon { font-size:36px; flex-shrink:0; }
  .dica-texto { color:#fff; font-size:22px; font-weight:600; line-height:1.4; }
  .dica-texto strong { color:#f0c060; }

  .footer { padding:24px 80px; background:#f8fafc; border-top:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .footer-slide { font-size:20px; color:#94a3b8; font-weight:500; }
  .footer-site { font-size:20px; color:#c9920a; font-weight:800; }
  .progress { display:flex; gap:8px; align-items:center; }
  .progress-dot { width:10px; height:10px; border-radius:50%; background:#e2e8f0; }
  .progress-dot.ativo { background:#c9920a; width:28px; border-radius:5px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="deco1"></div><div class="deco2"></div>
    <div class="header-top">
      <div class="logo-area">
        <div class="logo-circle">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="56" height="56">
            <circle cx="50" cy="38" r="26" fill="none" stroke="#c9920a" stroke-width="4"/>
            <line x1="50" y1="12" x2="50" y2="4" stroke="#c9920a" stroke-width="3" stroke-linecap="round"/>
            <line x1="24" y1="38" x2="16" y2="38" stroke="#c9920a" stroke-width="3" stroke-linecap="round"/>
            <line x1="84" y1="38" x2="76" y2="38" stroke="#c9920a" stroke-width="3" stroke-linecap="round"/>
            <line x1="32" y1="19" x2="26" y2="13" stroke="#c9920a" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="68" y1="19" x2="74" y2="13" stroke="#c9920a" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="30" y="52" width="10" height="14" rx="2" fill="#1a2f5e"/>
            <rect x="44" y="44" width="10" height="22" rx="2" fill="#1a2f5e"/>
            <rect x="58" y="36" width="10" height="30" rx="2" fill="#1a2f5e"/>
            <path d="M28 58 Q50 30 74 34" fill="none" stroke="#c9920a" stroke-width="3" stroke-linecap="round"/>
            <polygon points="74,28 81,37 67,35" fill="#c9920a"/>
          </svg>
        </div>
        <div class="logo-text"><strong>Bom Dia Investidor</strong><span>EDUCAÇÃO FINANCEIRA</span></div>
      </div>
      <div class="badge"><div class="badge-dot"></div>{{BADGE}}</div>
    </div>
    <div class="icone-edu">{{ICONE}}</div>
    <div class="header-titulo">{{TITULO}}</div>
    <div class="header-sub">{{SUBTITULO}}</div>
  </div>

  <div class="gold-bar"></div>

  <div class="body">
    {{CONTEUDO_HTML}}
    <div class="dica-box">
      <div class="dica-icon">💡</div>
      <div class="dica-texto">{{DICA}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="progress">{{PROGRESS_DOTS}}</div>
    <div class="footer-site">@bomdia_investidor</div>
  </div>
</div>
</body>
</html>
