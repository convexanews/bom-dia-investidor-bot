<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px; overflow: hidden;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    background: #080c16;
  }
  .card { width: 1080px; height: 1350px; position: relative; overflow: hidden; display: flex; flex-direction: column; }

  /* ── HEADER escuro com gradiente ── */
  .header {
    background: linear-gradient(135deg, #0d1b38 0%, #1a2f5e 70%, #0f2248 100%);
    padding: 56px 72px 52px;
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  /* círculos decorativos */
  .deco { position:absolute; border-radius:50%; pointer-events:none; }
  .deco1 { right:-100px; top:-100px; width:400px; height:400px; background:rgba(201,146,10,0.08); }
  .deco2 { left:-60px; bottom:-80px; width:260px; height:260px; background:rgba(201,146,10,0.05); }

  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; position:relative; z-index:2; }

  .brand-pill {
    display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
    border-radius:60px; padding:12px 26px 12px 16px;
  }
  .brand-logo {
    width:46px; height:46px; border-radius:50%; background:#c9920a;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .brand-logo svg { width:28px; height:28px; }
  .brand-name { font-size:22px; font-weight:800; color:#fff; }
  .brand-name span { color:#f0c060; }

  .edu-badge {
    display:flex; align-items:center; gap:10px;
    background:rgba(201,146,10,0.16); border:1.5px solid rgba(201,146,10,0.35);
    border-radius:60px; padding:12px 24px;
    font-size:18px; font-weight:800; color:#f0c060;
    letter-spacing:2px; text-transform:uppercase;
  }
  .edu-dot { width:9px; height:9px; border-radius:50%; background:#f0c060; }

  .header-icon { font-size:64px; margin-bottom:18px; position:relative; z-index:2; display:block; }
  .header-titulo { font-size:66px; font-weight:900; color:#fff; line-height:1.1; letter-spacing:-1px; position:relative; z-index:2; }
  .header-sub { font-size:26px; color:#c9a24a; margin-top:14px; font-weight:600; position:relative; z-index:2; }

  /* barra dourada */
  .gold-bar { height:5px; background:linear-gradient(90deg,#c9920a 0%,#f0c060 50%,#c9920a 100%); flex-shrink:0; }

  /* ── CORPO ── */
  .body { padding:44px 72px 36px; display:flex; flex-direction:column; gap:22px; flex:1; overflow:hidden; background:#fff; }

  .item {
    display:flex; align-items:flex-start; gap:20px;
    padding:26px 28px; border-radius:14px;
    background:#f8fafc; border-left:5px solid #1a2f5e;
  }
  .item-num {
    width:48px; height:48px; border-radius:50%; background:#1a2f5e;
    color:#f0c060; font-size:22px; font-weight:900;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .item-body { flex:1; }
  .item-titulo { font-size:24px; font-weight:800; color:#0f172a; margin-bottom:7px; line-height:1.2; }
  .item-desc { font-size:20px; color:#475569; line-height:1.55; }

  .dica {
    background:linear-gradient(135deg, #1a2f5e 0%, #243f7a 100%);
    border-radius:14px; padding:26px 32px;
    display:flex; align-items:center; gap:18px; flex-shrink:0;
  }
  .dica-icon { font-size:34px; flex-shrink:0; }
  .dica-text { color:#fff; font-size:21px; font-weight:600; line-height:1.45; }
  .dica-text strong { color:#f0c060; }

  /* ── FOOTER ── */
  .footer {
    padding:20px 72px; background:#f8fafc; border-top:1px solid #e9edf2;
    display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
  }
  .progress { display:flex; gap:8px; align-items:center; }
  .pdot { width:10px; height:10px; border-radius:50%; background:#dde3ef; }
  .pdot.on { background:#c9920a; width:28px; border-radius:5px; }
  .footer-handle { font-size:19px; font-weight:700; color:#c9920a; }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="deco deco1"></div><div class="deco deco2"></div>
    <div class="header-top">
      <div class="brand-pill">
        <div class="brand-logo">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="14" cy="10" r="7" fill="none" stroke="#fff" stroke-width="2"/>
            <line x1="14" y1="3" x2="14" y2="1" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="7" y1="10" x2="5" y2="10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="23" y1="10" x2="21" y2="10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
            <rect x="7" y="16" width="3.5" height="6" rx="1" fill="#fff"/>
            <rect x="12" y="13" width="3.5" height="9" rx="1" fill="#fff"/>
            <rect x="17" y="10" width="3.5" height="12" rx="1" fill="#fff"/>
            <path d="M7 19 Q14 11 21 12" fill="none" stroke="#f0c060" stroke-width="1.8" stroke-linecap="round"/>
            <polygon points="21,9.5 24,13 18,12.5" fill="#f0c060"/>
          </svg>
        </div>
        <div class="brand-name">Bom Dia <span>Investidor</span></div>
      </div>
      <div class="edu-badge"><div class="edu-dot"></div>{{BADGE}}</div>
    </div>
    <span class="header-icon">{{ICONE}}</span>
    <div class="header-titulo">{{TITULO}}</div>
    <div class="header-sub">{{SUBTITULO}}</div>
  </div>

  <div class="gold-bar"></div>

  <div class="body">
    {{CONTEUDO_HTML}}
    <div class="dica">
      <div class="dica-icon">💡</div>
      <div class="dica-text">{{DICA}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="progress">{{PROGRESS_DOTS}}</div>
    <div class="footer-handle">@bomdia_investidor</div>
  </div>

</div>
</body>
</html>
