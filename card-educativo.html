<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
  .card { width: 1080px; height: 1350px; display: flex; flex-direction: column; overflow: hidden; }

  .header {
    background: linear-gradient(135deg, #0a1628 0%, #1a2f5e 65%, #0d1f45 100%);
    padding: 50px 72px 46px; flex-shrink: 0; position: relative; overflow: hidden;
  }
  .deco { position: absolute; border-radius: 50%; pointer-events: none; }
  .deco1 { right: -100px; top: -100px; width: 420px; height: 420px; background: rgba(201,146,10,0.09); }
  .deco2 { left: -60px; bottom: -60px; width: 220px; height: 220px; background: rgba(201,146,10,0.05); }

  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; position: relative; z-index: 2; }

  .logo-wrap { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 8px 20px 8px 8px; display: flex; align-items: center; gap: 12px; }
  .logo-wrap img { height: 56px; width: auto; display: block; border-radius: 8px; }
  .logo-wrap .lt1 { font-size: 19px; font-weight: 900; color: #1a2f5e; display: block; line-height: 1.1; }
  .logo-wrap .lt2 { font-size: 13px; font-weight: 700; color: #c9920a; letter-spacing: 1px; text-transform: uppercase; display: block; }

  .edu-badge {
    display: flex; align-items: center; gap: 10px;
    background: rgba(201,146,10,0.16); border: 1.5px solid rgba(201,146,10,0.35);
    border-radius: 60px; padding: 12px 24px;
    font-size: 18px; font-weight: 800; color: #f0c060;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .e-dot { width: 9px; height: 9px; border-radius: 50%; background: #f0c060; }

  .header-icon { font-size: 58px; margin-bottom: 14px; position: relative; z-index: 2; display: block; }
  .header-titulo { font-size: 64px; font-weight: 900; color: #fff; line-height: 1.08; letter-spacing: -1px; position: relative; z-index: 2; }
  .header-sub { font-size: 24px; color: #c9a24a; margin-top: 10px; font-weight: 600; position: relative; z-index: 2; }

  .gold-bar { height: 5px; background: linear-gradient(90deg,#c9920a,#f0c060 50%,#c9920a); flex-shrink: 0; }

  .body { flex: 1; background: #fff; padding: 36px 72px 28px; display: flex; flex-direction: column; gap: 18px; overflow: hidden; }

  .item {
    display: flex; align-items: flex-start; gap: 18px;
    padding: 22px 24px; border-radius: 14px;
    background: #f8fafc; border-left: 5px solid #1a2f5e;
  }
  .item-num {
    width: 46px; height: 46px; border-radius: 50%; background: #1a2f5e;
    color: #f0c060; font-size: 21px; font-weight: 900;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .item-body { flex: 1; }
  .item-titulo { font-size: 23px; font-weight: 800; color: #0f172a; margin-bottom: 6px; line-height: 1.2; }
  .item-desc { font-size: 19px; color: #475569; line-height: 1.55; }

  .dica {
    background: linear-gradient(135deg, #1a2f5e 0%, #243f7a 100%);
    border-radius: 14px; padding: 22px 28px;
    display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .dica-icon { font-size: 30px; flex-shrink: 0; }
  .dica-text { color: #fff; font-size: 19px; font-weight: 600; line-height: 1.45; }
  .dica-text strong { color: #f0c060; }

  .footer {
    padding: 18px 72px; background: #f8fafc; border-top: 1px solid #e9edf2;
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .progress { display: flex; gap: 8px; align-items: center; }
  .pdot { width: 10px; height: 10px; border-radius: 50%; background: #dde3ef; }
  .pdot.on { background: #c9920a; width: 26px; border-radius: 5px; }
  .footer-handle { font-size: 18px; font-weight: 700; color: #c9920a; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="deco deco1"></div><div class="deco deco2"></div>
    <div class="header-top">
      <div class="logo-wrap">
        <img src="logo-bdi.jpeg" alt="BDI">
        <div><span class="lt1">BOM DIA INVESTIDOR</span><span class="lt2">Educação Financeira</span></div>
      </div>
      <div class="edu-badge"><div class="e-dot"></div>{{BADGE}}</div>
    </div>
    <span class="header-icon">{{ICONE}}</span>
    <div class="header-titulo">{{TITULO}}</div>
    <div class="header-sub">{{SUBTITULO}}</div>
  </div>

  <div class="gold-bar"></div>

  <div class="body">
    {{CONTEUDO_HTML}}
    <div class="dica">
      <div class="dica-icon">💡</div>
      <div class="dica-text">{{DICA}}</div>
    </div>
  </div>

  <div class="footer">
    <div class="progress">{{PROGRESS_DOTS}}</div>
    <div class="footer-handle">@bomdia_investidor</div>
  </div>
</div>
</body>
</html>
